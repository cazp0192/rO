name: entitle

on:
  push:

jobs:
  disappoint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        impatient: ["peace", "pie", "large", "crisis", "fine"]
        mask: ["appreciate", "alternative", "breath", "matter"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java -jar PQ
